name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug", "status: needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenPet. English or Chinese are both welcome.
  - type: checkboxes
    id: existing
    attributes:
      label: Existing issues
      description: Please search before opening a new issue.
      options:
        - label: I have searched existing issues and did not find a duplicate.
          required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
      placeholder: Describe the bug and what you saw.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give the smallest set of steps that reproduces the problem.
      placeholder: |
        1. Start OpenPet...
        2. Open Settings...
        3. See...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenPet version
      placeholder: "v0.1.2, main branch commit, or unknown"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or drag screenshots here if they help explain the issue.
      render: shell
    validations:
      required: false
  - type: textarea
    id: extra-context
    attributes:
      label: Additional context
      description: Anything else that may help us investigate.
    validations:
      required: false
