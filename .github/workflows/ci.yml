name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  check:
    name: Build and check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libx11-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

  e2e:
    name: Browser E2E
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser E2E
        run: pnpm e2e

  tauri-webdriver-e2e:
    name: Tauri WebDriver E2E (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            platform: ubuntu-22.04
          - name: Windows
            platform: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux Tauri and WebDriver dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libx11-dev \
            dbus-x11 \
            webkit2gtk-driver \
            xvfb

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Microsoft Edge Driver
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Build Tauri debug app for WebDriver
        run: pnpm tauri build --debug --no-bundle

      - name: Run Tauri WebDriver E2E on Linux
        if: runner.os == 'Linux'
        env:
          GDK_BACKEND: x11
          LIBGL_ALWAYS_SOFTWARE: "1"
          NO_AT_BRIDGE: "1"
          OPENPET_SKIP_TAURI_BUILD: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: xvfb-run -a dbus-run-session -- pnpm e2e:tauri

      - name: Run Tauri WebDriver E2E on Windows
        if: runner.os == 'Windows'
        env:
          OPENPET_SKIP_TAURI_BUILD: "1"
        run: pnpm e2e:tauri
