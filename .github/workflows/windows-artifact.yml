name: Build Windows artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows x64 OpenPet
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows NSIS installer
        run: pnpm tauri build --bundles nsis

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item 'src-tauri/target/release/openpet.exe' 'artifact/OpenPet.exe'
          Copy-Item 'src-tauri/target/release/bundle/nsis/*.exe' 'artifact/'

      - name: Upload OpenPet Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenPet-Windows-x64
          path: artifact/
          if-no-files-found: error
          retention-days: 14
